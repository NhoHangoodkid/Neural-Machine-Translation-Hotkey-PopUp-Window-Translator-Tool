# Cau hinh app dich. Sua o day, khong can sua code.
 
hotkeys:
  translate_selection: "ctrl+shift+y"
  translate_ocr: "ctrl+shift+h"   # hotkey cho OCR
 
device: "cpu"          # "cuda" neu may co GPU NVIDIA + CTranslate2 ban GPU
 
engines:
  default: "en-vi"
  en-vi:
    model_dir: "models/en-vi-ct2"
    tokenizer_dir: "models/tokenizer-en-vi"
  # vi-en:                          # bo comment khi co model VI->EN
  #   model_dir: "models/vi-en-ct2"
  #   tokenizer_dir: "models/tokenizer-vi-en"
 
translation:
  max_input_length: 128   # khop voi luc train
  num_beams: 4
  num_hypotheses: 2       # hien thi 2 ban dich khac nhau tu beam search
  max_decode_length: 128
 
ui:
  popup_timeout_ms: 15000  # tu dong dong sau bao lau (0 = khong tu dong)
  font_size: 13
  max_width: 480

ocr:
  lang: "en"           # paddleocr lang: "en", "vi", "ch", "japan", ...
  use_gpu: false 